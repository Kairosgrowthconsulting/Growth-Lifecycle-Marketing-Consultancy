---
layout: default
---

<section class="post-container">
    <h1>{{ page.title }}</h1>

    <div class="post-meta">
        <span>{{ page.date | date: "%B %d, %Y" }}</span>
        <span>•</span>
        <span>{{ page.readtime }}</span>
    </div>

    <div class="post-content">
        {{ content }}
    </div>
</section>
